server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API calls → Express
    location /api/ {
        proxy_pass         http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check → Express
    location /health {
        proxy_pass         http://server:3000;
        proxy_http_version 1.1;
    }

    # Short code redirects (6-12 base62 chars) → Express
    # This pattern matches short codes before falling through to the SPA.
    location ~ ^/[0-9A-Za-z]{6,12}$ {
        proxy_pass         http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → React SPA (client-side routing fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
